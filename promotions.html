<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Promotions | Mini Market Al Hamama</title>

<style>

body{
font-family: Arial;
margin:0;
background: linear-gradient(135deg,#f8fffa,#eef7f0);
}

/* HEADER */
header{
background: linear-gradient(90deg,#ff6a00,#ff3cac,#2ecc71);
color:white;
text-align:center;
padding:25px;
font-size:28px;
font-weight:bold;
}

/* SECTION */
.section{
padding:40px;
text-align:center;
}

.section h2{
font-size:32px;
margin-bottom:30px;
}

/* GRID */
.products{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:15px;
width:260px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
position:relative;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* IMAGE */
.card img{
width:180px;
height:180px;
object-fit:contain;
}

/* PROMO BADGE */
.badge{
position:absolute;
top:12px;
left:12px;
background:red;
color:white;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

/* SUPER PROMO BADGE */
.super{
background:#ff0000;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* OLD PRICE */
.old-price{
text-decoration:line-through;
color:gray;
font-size:18px;
margin-top:10px;
}

/* NEW PRICE */
.new-price{
color:red;
font-size:26px;
font-weight:bold;
}

/* BUTTON */
.btn{
background:#25D366;
color:white;
padding:12px 20px;
border-radius:8px;
display:inline-block;
margin-top:15px;
text-decoration:none;
font-weight:bold;
}

.btn:hover{
background:#1ebe5d;
}

</style>

</head>
<body>

<header>
🔥 Promotions spéciales
</header>

<div class="section">

<h2>Offres en cours</h2>

<div class="products">

<!-- Ferrero Küsschen -->
<div class="card">

<div class="badge super">SUPER PROMO</div>

<img src="ferrero-kusschen.jpg">

<h3>Ferrero Küsschen</h3>

<p class="old-price">75 DH</p>

<p class="new-price">30 DH</p>

<a href="https://wa.me/212652243366?text=Je veux Ferrero Kusschen promo"
class="btn">
Commander WhatsApp
</a>

</div>

</div>

</div>

</body>
</html>
