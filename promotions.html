<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Promotions | Mini Market Al Hamama</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */

.header{
    background:linear-gradient(135deg,#ff7e5f,#feb47b,#86c96f);
    padding:40px;
    text-align:center;
    color:white;
}

.header h1{
    margin:0;
}

/* CONTAINER */

.container{
    padding:40px;
}

/* GRID */

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* CARD */

.product-card{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    position:relative;
    transition:0.3s;
}

.product-card:hover{
    transform:translateY(-5px);
}

/* IMAGE */

.product-card img{
    width:140px;
    height:140px;
    object-fit:contain;
}

/* BADGE */

.badge{
    position:absolute;
    top:10px;
    left:10px;
    background:red;
    color:white;
    padding:5px 10px;
    border-radius:8px;
    font-size:12px;
    font-weight:bold;
}

/* PRICES */

.old-price{
    text-decoration:line-through;
    color:grey;
}

.new-price{
    color:red;
    font-size:22px;
    font-weight:bold;
}

/* BUTTON */

.btn{
    display:inline-block;
    margin-top:10px;
    background:#25D366;
    color:white;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.btn:hover{
    background:#1ebe5d;
}

/* WHATSAPP FLOAT */

.whatsapp-float{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    font-size:22px;
}

</style>

</head>
<body>

<div class="header">
<h1>🔥 Promotions</h1>
<p>Offres spéciales limitées</p>
</div>

<div class="container">

<div class="products">

<!-- KINDER BUENO -->

<div class="product-card">

<div class="badge">SUPER PROMO</div>

<img src="kinder-bueno.jpg">

<h3>Kinder Bueno</h3>

<p class="old-price">9 DH</p>

<p class="new-price">6 DH</p>

<a href="https://wa.me/212652243366?text=Je veux Kinder Bueno en promo"
class="btn">
Commander WhatsApp
</a>

</div>

<!-- FERRERO KUSSCHEN -->

<div class="product-card">

<div class="badge">SUPER PROMO</div>

<img src="ferrero-kusschen.jpg">

<h3>Ferrero Küsschen</h3>

<p class="old-price">75 DH</p>

<p class="new-price">30 DH</p>

<a href="https://wa.me/212652243366?text=Je veux Ferrero Küsschen en promo"
class="btn">
Commander WhatsApp
</a>

</div>

</div>

</div>

<!-- WhatsApp Floating -->

<a href="https://wa.me/212652243366" class="whatsapp-float">
💬
</a>

</body>
</html>
