<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chocolats - Mini Market Al Hamama</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#f3ecff,#e0f7fa);
}

/* HEADER */

header{
background:linear-gradient(90deg,#ff6a00,#ee0979);
color:white;
text-align:center;
padding:30px;
}

header h1{
margin:0;
}

/* SECTION */

.section{
padding:40px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
max-width:1000px;
margin:auto;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:140px;
height:140px;
object-fit:contain;
margin-bottom:10px;
}

/* PRICE */

.price{
color:red;
font-size:22px;
font-weight:bold;
margin:5px 0;
}

.old-price{
color:gray;
text-decoration:line-through;
margin:0;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.btn:hover{
background:#1ebe5d;
}

/* BACK BUTTON */

.back{
display:inline-block;
margin-top:30px;
padding:10px 20px;
background:#333;
color:white;
text-decoration:none;
border-radius:8px;
}

/* WHATSAPP FLOAT */

.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:28px;
padding:12px;
border-radius:50%;
text-decoration:none;
}

</style>

</head>
<body>

<header>
<h1>🍫 Nos Chocolats</h1>
<p>Stock disponible</p>
</header>

<section class="section">

<div class="grid">
