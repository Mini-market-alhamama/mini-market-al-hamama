<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chocolats - Mini Market Al Hamama</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

/* HEADER */
.header{
    background:linear-gradient(90deg,#11998e,#38ef7d);
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    padding:40px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

/* CARD */
.product{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.product:hover{
    transform:translateY(-8px);
}

/* IMAGE */
.product img{
    width:140px;
    height:140px;
    object-fit:contain;
}

/* TITLE */
.product h3{
    margin:10px 0;
}

/* PRICE */
.price{
    color:#e74c3c;
    font-size:20px;
    font-weight:bold;
}

/* OLD PRICE */
.old-price{
    text-decoration:line-through;
    color:gray;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#25D366;
    color:white;
    border-radius:8px;
    text-decoration:none;
}

.btn:hover{
    background:#1ebe5d;
}

/* PROMO BADGE */
.badge{
    position:absolute;
    background:red;
    color:white;
    padding:5px 10px;
    border-radius:8px;
    font-size:12px;
}

.product-container{
    position:relative;
}

</style>

</head>

<div class="header">
