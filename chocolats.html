<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chocolats | Mini Market Al Hamama</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f8;
}

/* HEADER */

.header{
    background:linear-gradient(135deg,#8b4513,#d2691e);
    padding:40px;
    text-align:center;
    color:white;
}

/* CONTAINER */

.container{
    padding:40px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* CARD */

.product-card{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    position:relative;
}

.product-card img{
    width:140px;
    height:140px;
    object-fit:contain;
}

/* PROMO BADGE */

.badge{
    position:absolute;
    top:10px;
    left:10px;
    background:red;
    color:white;
    padding:5px 10px;
    border-radius:10px;
    font-size:12px;
}

/* PRICES */

.old-price{
    text-decoration:line-through;
    color:gray;
}

.price{
    color:red;
    font-size:22px;
    font-weight:bold;
}

/* BUTTON */

.btn{
    display:inline-block;
    margin-top:10px;
    background:#25D366;
    color:white;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
}

.btn:hover{
    background:#1ebe5d;
}

</style>

</head>
<body>

<div class="header">
<h1>🍫 Nos Chocolats</h1>
<p>Stock disponible</p>
</div>

<div class="container">
<div class="products">


<!-- KINDER BUENO PROMO -->

<div class="product-card">

<div class="badge">PROMO</div>

<img src="kinder-bueno.jpg">

<h3>Kinder Bueno</h3>

<p class="old-price">9 DH</p>

<p class="price">6 DH</p>

<a href="https://wa.me/212652243366?text=Je veux Kinder Bueno"
class="btn">Commander WhatsApp</a>

</div>


<!-- MARS -->

<div class="product-card">

<img src="mars.jpg">

<h3>Mars</h3>

<p class="price">5 DH</p>

<a href="https://wa.me/212652243366?text=Je veux Mars"
class="btn">Commander WhatsApp</a>

</div>


<!-- TWIX -->

<div class="product-card">

<img src="twix.jpg">

<h3>Twix</h3>

<p class="price">5 DH</p>

<a href="https://wa.me/212652243366?text=Je veux Twix"
class="btn">Commander WhatsApp</a>

</div>


<!-- NESTLE -->

<div class="product-card">

<img src="nestle.jpg">

<h3>Nestlé Chocolat</h3>

<p class="price">20 DH</p>

<a href="https://wa.me/212652243366?text=Je veux Nestlé Chocolat"
class="btn">Commander WhatsApp</a>

</div>


</div>
</div>

</body>
</html>
