<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Boissons - Mini Market Al Hamama</title>

<style>

body{
font-family: Arial;
margin:0;
background: linear-gradient(135deg,#e6f7ff,#f0fff4);
}

header{
background: linear-gradient(90deg,#ff6a00,#ff3cac,#2ecc71);
color:white;
text-align:center;
padding:20px;
}

header a{
color:white;
text-decoration:none;
font-size:18px;
background:white;
color:#ff3cac;
padding:10px 20px;
border-radius:10px;
}

section{
padding:40px;
text-align:center;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
width:220px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

</style>

</head>

<body>

<header>
<h1>🥤 Nos Boissons</h1>
<a href="index.html">⬅ Retour</a>
</header>

<section>

<div class="products">

<div class="card">
<img src="juver-ananas.jpg">
<h3>Juver Ananas</h3>
</div>

<div class="card">
<img src="schweppes-citrus.jpg">
<h3>Schweppes Citrus</h3>
</div>

<div class="card">
<img src="redbull.jpg">
<h3>Red Bull</h3>
</div>

<div class="card">
<img src="oulmes-mojito.jpg">
<h3>Oulmès Mojito</h3>
</div>

<div class="card">
<img src="oulmes-orange.jpg">
<h3>Oulmès Orange</h3>
</div>

<div class="card">
<img src="bifrutas.jpg">
<h3>Bifrutas Tropical</h3>
</div>

<div class="card">
<img src="alboustane-orange.jpg">
<h3>Al Boustane Orange</h3>
</div>

<div class="card">
<img src="juver-multifruit.jpg">
<h3>Juver Multifruit</h3>
</div>

</div>

</section>

</body>
</html>
