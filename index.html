<html lang="fr">
<head>

<title>Mini Market Al Hamama</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#a18cd1);
}

/* HEADER PREMIUM */

header{
background:linear-gradient(90deg,#ff6a00,#ff3cac,#2ecc71);
color:white;
padding:30px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.logo{
width:90px;
margin-bottom:10px;
}

header h1{
margin:0;
font-size:34px;
}

header p{
margin:5px;
}

/* CATEGORIES */

.categories{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:40px;
}

.card{
background:white;
width:260px;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
margin-bottom:10px;
}

.btn{
display:inline-block;
margin-top:10px;
padding:12px 20px;
background:#2ecc71;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.btn:hover{
background:#27ae60;
}

/* FOOTER */

footer{
background:#222;
color:white;
padding:25px;
text-align:center;
margin-top:40px;
}

footer a{
color:#2ecc71;
text-decoration:none;
margin:10px;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">
